spring:
  datasource:
    url: jdbc:h2:mem:attendance;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

attendance:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    access-ttl-seconds: 900
    refresh-ttl-seconds: 604800
  cookie:
    secure: false
  reports:
    dir: target/test-reports
  backups:
    dir: target/test-backups
